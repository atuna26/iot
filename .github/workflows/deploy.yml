name: Deploy HipoUI via SSH

on:
  push:
    branches:
      - main  # ya da hangi branch deploy edilecekse

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu checkout et
        uses: actions/checkout@v3

      - name: SSH ile sunucuya bağlan ve deploy et
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: '8735'  
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/rootuser/hipoui

            echo "🔧 Eski container durduruluyor..."
            docker stop hipoui-container || true
            docker rm hipoui-container || true
            docker rmi hipoui || true

            echo "🧹 Temizlik ve yeniden build..."
            rm -rf node_modules dist
            npm install
            npm run build

            echo "🐳 Docker image build ediliyor..."
            docker build -t hipoui .

            echo "🚀 Yeni container ayağa kaldırılıyor..."
            docker run -d -p 7772:80 --name hipoui-container hipoui